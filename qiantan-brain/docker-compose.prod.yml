# 生产部署：docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  db:
    deploy:
      resources:
        limits:
          memory: 1G
    volumes:
      - ./deploy/backups:/backups

  redis:
    deploy:
      resources:
        limits:
          memory: 384M

  migrate:
    build:
      context: ./backend
    restart: "no"
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-qiantan}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-qiantan}
      DB_BACKEND: postgresql
      JWT_SECRET: ${JWT_SECRET:?请在 .env 中设置 JWT_SECRET}
      DEBUG: "false"
      RUN_MIGRATIONS_ON_STARTUP: "false"
      AUTH_ALLOW_FALLBACK: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:?请配置管理后台和 API 的 HTTPS 域名}
    depends_on:
      db:
        condition: service_healthy
    networks: [private]

  backend:
    environment:
      DEBUG: "false"
      RUN_MIGRATIONS_ON_STARTUP: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:?请配置管理后台和 API 的 HTTPS 域名}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      replicas: ${BACKEND_REPLICAS:-2}
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

  nginx:
    build:
      context: .
      dockerfile: backend/admin-web/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--header=Host: localhost", "-O", "/dev/null", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - private
      - public

networks:
  public:
  private:
    internal: true
