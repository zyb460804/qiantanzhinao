services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qiantan}
      POSTGRES_USER: ${POSTGRES_USER:-qiantan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qiantan} -d ${POSTGRES_DB:-qiantan}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [private]

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [private]

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-qiantan}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-qiantan}
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
      RUN_MIGRATIONS_ON_STARTUP: ${RUN_MIGRATIONS_ON_STARTUP:-true}
      JWT_SECRET: ${JWT_SECRET:?请在 .env 中设置 JWT_SECRET}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-10080}
      ADMIN_JWT_EXPIRE_MINUTES: ${ADMIN_JWT_EXPIRE_MINUTES:-30}
      ADMIN_COOKIE_NAME: ${ADMIN_COOKIE_NAME:-admin_session}
      WECHAT_APPID: ${WECHAT_APPID:?请在 .env 中设置 WECHAT_APPID}
      WECHAT_SECRET: ${WECHAT_SECRET:?请在 .env 中设置 WECHAT_SECRET}
      AUTH_ALLOW_FALLBACK: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-https://servicewechat.com}
      RATE_LIMIT_BACKEND: redis
      RATE_LIMIT_REDIS_URL: redis://redis:6379/0
      DEVICE_NONCE_BACKEND: redis
      ASR_API_KEY: ${ASR_API_KEY:-}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      WEATHER_CITY_ID: ${WEATHER_CITY_ID:-101020100}
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    networks:
      - private
      - egress

networks:
  private:
    internal: true
  egress:


volumes:
  pgdata:
  redis_data:
  uploads_data:
