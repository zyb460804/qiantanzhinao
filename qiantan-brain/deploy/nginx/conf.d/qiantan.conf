# Replace example domains and install deploy/certs/fullchain.pem + privkey.pem.

# Container health endpoint. Unknown plaintext hosts are dropped.
server {
    listen 80 default_server;
    server_name localhost;
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }
    location / { return 444; }
}

server {
    listen 80;
    server_name admin.qiantan.example.com api.qiantan.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.qiantan.example.com;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'" always;

    location = /api/admin/login {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass http://backend:8000;
        include /etc/nginx/proxy_params;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass http://backend:8000;
        include /etc/nginx/proxy_params;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        add_header Cache-Control "no-store" always;
    }

    location /assets/ {
        root /usr/share/nginx/html/admin;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        root /usr/share/nginx/html/admin;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        root /usr/share/nginx/html/admin;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

server {
    listen 443 ssl http2;
    server_name api.qiantan.example.com;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass http://backend:8000;
        include /etc/nginx/proxy_params;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        add_header Cache-Control "no-store" always;
    }

    location / { return 404; }
}
